name: Build and Release Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: gradle

    - name: Set up Node.js (Stable LTS)
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Configure Gradle for performance and fix memory limit
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Djava.awt.headless=true" >> ~/.gradle/gradle.properties
        echo "ksp.useKSP2=true" >> ~/.gradle/gradle.properties
        echo "kotlin.compiler.execution.strategy=in-process" >> ~/.gradle/gradle.properties
        echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Make Gradlew Executable and Verify Integrities
      run: |
        chmod +x gradlew
        ./gradlew --version

    - name: Clean Gradle Cache
      run: ./gradlew clean

    - name: Decode Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Build Release AAB
      run: ./gradlew bundleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SismoRedVen-Debug-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SismoRedVen-Release-APK
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: SismoRedVen-Release-AAB
        path: app/build/outputs/bundle/release/*.aab
