name: Build and Release Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Set up Node.js (Stable LTS)
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Configure Gradle for performance and fix memory limit
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Clean Gradle Cache
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SismoRedVen-Debug-Signed
        path: app/build/outputs/apk/debug/app-debug.apk
